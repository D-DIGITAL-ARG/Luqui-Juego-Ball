<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luqui - Brain Physics</title>
    <!-- Fonts for Naïve and Signal Graphics styles -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Kalam:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Gradient Blur / Acid Blur Background -->
    <div class="background-gradient"></div>

    <div id="ui-layer">
        <!-- Signal Graphics Header -->
        <header class="signal-graphics">
            <div class="level-indicator">NIVEL_01</div>
            <div>
                <span class="score-indicator">PTS: 0000</span>
                <button id="in-game-retry" class="signal-btn"
                    style="margin-left: 15px; padding: 5px 10px; font-size: 0.8rem;">[ REINICIAR ]</button>
            </div>
        </header>

        <!-- Metacognitive Feedback Modal (Hidden by default) -->
        <div id="feedback-modal" class="hidden">
            <h2 class="naive-text">¡Ups!</h2>
            <p class="naive-text">¿Por qué crees que la forma no alcanzó el objetivo?</p>
            <p class="naive-text">¿Y si pruebas ajustando la rampa o el peso?</p>
            <button id="retry-btn" class="signal-btn">[ REINTENTAR ]</button>
        </div>

        <!-- Reward Modal (Hidden by default) -->
        <div id="reward-modal" class="hidden">
            <h2 class="naive-text">¡Misión Cumplida!</h2>
            <div class="trinket-badge">🌟</div>
            <p class="naive-text">¡Has obtenido el emblema de la Gravedad!</p>
            <button id="next-btn" class="signal-btn">[ SIGUIENTE NIVEL ]</button>
        </div>
    </div>

    <!-- Main Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>

</html>
